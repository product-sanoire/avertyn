<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avertyn — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#141312;--mut:#5e5e57;--faint:#6c6c64;--line:#e7e5df;--hair:#efeee9;--bg:#f4f2ee;--panel:#fff;--sig:#b23a2a;--sig-soft:#f6e9e6;--ok:#2f6f52;--ok-soft:#e7f0eb;--warn:#8a6a1f;--warn-soft:#f6efdf;--sans:'Inter',system-ui,sans-serif;--disp:'Fraunces',Georgia,serif;--num:'Space Grotesk',monospace;--r:14px;--sh:0 1px 2px rgba(30,28,24,.04),0 6px 20px rgba(30,28,24,.05);--shh:0 2px 8px rgba(30,28,24,.07),0 16px 38px rgba(30,28,24,.10)}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);letter-spacing:-.01em;-webkit-font-smoothing:antialiased;font-size:13px}
.num{font-family:var(--num);font-variant-numeric:tabular-nums;letter-spacing:0}
.lab{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.btn{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 14px;font:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:.14s;box-shadow:0 1px 1px rgba(30,28,24,.02)}
.btn:hover{border-color:#cfcdc6;box-shadow:var(--sh)}.btn.pri{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:0 2px 8px rgba(20,19,18,.16)}.btn.pri:hover{background:#000;box-shadow:var(--shh)}
.btn.sm{padding:5px 11px;font-size:11px}.btn:disabled{opacity:.4;cursor:default;box-shadow:none}
.dot{width:6px;height:6px;border-radius:50%;flex:none}
.d-red{background:var(--sig)}.d-amber{background:var(--warn)}.d-green{background:var(--ok)}.d-ink{background:var(--ink)}
.tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:500;color:var(--mut)}
.pill{display:inline-block;font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
.mast{height:60px;flex:none;display:flex;align-items:center;gap:16px;padding:0 26px;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(30,28,24,.03),0 6px 18px rgba(30,28,24,.03);z-index:5}
.brand{display:flex;align-items:baseline;gap:2px;font-family:var(--disp);font-weight:400;font-size:21px;letter-spacing:-.02em}
.brand i{color:var(--sig);font-style:normal;font-size:22px;line-height:0}
.org{font-size:12px;color:var(--mut);padding-left:16px;border-left:1px solid var(--line);height:20px;display:flex;align-items:center}
.live{display:inline-flex;align-items:center;gap:6px;font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ok)}
.live .p{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pl 2s infinite}
@keyframes pl{0%{box-shadow:0 0 0 0 rgba(47,111,82,.45)}70%{box-shadow:0 0 0 6px rgba(47,111,82,0)}100%{box-shadow:0 0 0 0 rgba(47,111,82,0)}}
.grow{flex:1}
.qbox{position:relative}
.qbox input{background:#f4f3f1;border:1px solid var(--line);border-radius:9px;padding:7px 12px;font:inherit;font-size:12.5px;width:220px;color:var(--ink);outline:none}
.qbox input:focus{border-color:#cfcec8;background:#fff}
.qres{position:absolute;top:40px;right:0;width:340px;background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 12px 34px rgba(0,0,0,.09);z-index:30;max-height:360px;overflow:auto}
.qres .qi{padding:10px 14px;border-bottom:1px solid var(--hair);cursor:pointer}.qres .qi:last-child{border-bottom:0}.qres .qi:hover{background:#f5f4f1}
.qres .qi b{font-size:12.5px}.qres .qi .s{font-size:10.5px;color:var(--mut);margin-top:2px}
.qres .qt{font-size:8.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);font-weight:700;float:right}
.nav{height:48px;flex:none;display:flex;align-items:center;gap:3px;padding:0 22px;border-bottom:1px solid var(--line);background:var(--panel);overflow-x:auto}
.navtab{font-size:12.5px;color:var(--mut);padding:8px 14px;border-radius:9px;cursor:pointer;white-space:nowrap;font-weight:500;transition:.14s}
.navtab:hover{background:#f2f1ec;color:var(--ink)}.navtab.on{background:var(--ink);color:#fff;font-weight:500;box-shadow:0 2px 10px rgba(20,19,18,.20)}
.navtab .c{font-family:var(--num);font-size:10px;margin-left:6px;opacity:.7}
.navtab .b{display:inline-block;background:var(--sig);color:#fff;border-radius:10px;font-size:9px;font-weight:600;padding:1px 6px;margin-left:6px}
#view{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.page{flex:1;overflow:auto;padding:30px 38px 54px}
.pagehd{display:flex;align-items:baseline;gap:12px;margin-bottom:4px}
.pagehd h1{font-family:var(--disp);font-weight:400;font-size:30px;letter-spacing:-.025em;margin:0}
.pagehd .s{color:var(--mut);font-size:12px}.pagehd .rt{margin-left:auto;display:flex;gap:8px;align-items:center}
.kpis{flex:none;display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:18px 24px;border-bottom:1px solid var(--line);background:var(--bg)}
.kpi{padding:15px 17px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);transition:.16s}.kpi:hover{box-shadow:var(--shh);transform:translateY(-1px)}
.kpi .n{font-family:var(--num);font-weight:500;font-size:27px;margin-top:9px;letter-spacing:-.02em}
.kpi .d{font-size:10.5px;color:var(--mut);margin-top:3px}
.work{flex:1;display:grid;grid-template-columns:296px 1fr 336px;overflow:hidden}
.list{border-right:1px solid var(--line);overflow:auto}
.lhd{position:sticky;top:0;background:var(--bg);padding:16px 20px 10px;z-index:2}
.chips{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.chip{font-size:11px;color:var(--mut);padding:6px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--line);background:var(--panel);transition:.14s}
.chip:hover{border-color:#cfcdc6;color:var(--ink)}.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:0 2px 7px rgba(20,19,18,.16)}
.lrow{padding:13px 20px;border-top:1px solid var(--hair);cursor:pointer;position:relative}
.lrow:hover{background:#f5f4f1}.lrow.on{background:#f2f1ed}
.lrow.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sig)}
.lrow .r1{display:flex;align-items:center;justify-content:space-between;gap:8px}.lrow .rf{font-weight:600;font-size:12.5px}
.lrow .r2{font-size:11px;color:var(--mut);margin-top:5px;display:flex;justify-content:space-between;gap:8px}
.detail{overflow:auto;padding:30px 34px 40px}
.dref{font-family:var(--disp);font-weight:400;font-size:34px;letter-spacing:-.02em;margin:0}
.dmeta{color:var(--mut);font-size:12px;margin-top:8px}
.split{margin-top:2px;height:1px;background:var(--line)}
.drow{display:flex;gap:44px;margin-top:26px;align-items:flex-start}
.gauge{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;position:relative;flex:none}
.gauge::after{content:'';position:absolute;inset:7px;background:var(--bg);border-radius:50%}
.gauge .v{position:relative;text-align:center}.gauge .v b{font-family:var(--num);font-weight:500;font-size:30px;display:block;letter-spacing:-.03em}
.gauge .v span{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em}
.verdict{font-family:var(--disp);font-size:20px;margin:0}.vsub{font-size:12px;color:var(--mut);margin-top:8px;max-width:34ch;line-height:1.55}
.sect{margin-top:34px}.sect>.lab{padding-bottom:12px;border-bottom:1px solid var(--line);display:block}
.bar{margin:18px 0}.bl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:7px}.bl .num{font-weight:500}
.track{height:3px;background:var(--hair);position:relative}.fill{height:100%;position:absolute;left:0;top:0}
.note{font-size:11.5px;color:var(--mut);line-height:1.6;margin-top:14px;max-width:60ch}
.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--hair);margin-top:2px}
.meta div{background:var(--bg);padding:16px 2px 4px}.meta .n{font-family:var(--num);font-size:19px;font-weight:500;margin-top:8px}
.dacts{display:flex;gap:10px;margin-top:34px}
.rail{border-left:1px solid var(--line);overflow:auto;padding:22px 22px 40px}
.rlab{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:30px 0 0;padding-bottom:11px;border-bottom:1px solid var(--line)}
.rlab:first-child{margin-top:0}
.dial{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--hair);font-size:12px}.dial:last-child{border-bottom:0}
.qitem{padding:14px 0;border-bottom:1px solid var(--hair)}.qitem:last-child{border-bottom:0}
.qitem .qt{display:flex;justify-content:space-between;gap:8px;font-size:12px;font-weight:600}.qitem .qs{font-size:11px;color:var(--mut);margin:7px 0 0;line-height:1.5}
.feed{font-size:11.5px;color:var(--mut);line-height:1.9;padding-top:6px}.feed div{padding:4px 0;border-bottom:1px solid var(--hair)}.feed div:last-child{border-bottom:0}
.feed b{color:var(--ink);font-weight:600}.feed .mk{color:var(--faint);margin-right:6px}
.empty{font-size:11.5px;color:var(--faint);padding:14px 0}
.tool{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 0;border-bottom:1px solid var(--hair)}.tool:last-child{border-bottom:0}
.tool b{font-size:12.5px;font-weight:600}.tool .qs{font-size:10.5px;color:var(--mut);margin-top:4px;line-height:1.45;max-width:32ch}.tool .btn{padding:6px 13px;flex:none}
.tbl{width:100%;border-collapse:collapse;margin-top:6px}
.tbl th{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);text-align:left;padding:12px 16px 12px 0;border-bottom:1px solid var(--line);font-weight:600;cursor:default}
.tbl th.r,.tbl td.r{text-align:right}.tbl th.s{cursor:pointer}.tbl th.s:hover{color:var(--ink)}
.tbl td{padding:13px 16px 13px 0;border-bottom:1px solid var(--hair);font-size:12.5px;vertical-align:top}
.tbl tr:last-child td{border-bottom:0}.tbl .nm{font-weight:600}.tbl tbody tr{transition:.1s}.tbl tbody tr:hover td{background:#faf9f6}
.two{flex:1;display:grid;grid-template-columns:302px 1fr;overflow:hidden}
.two .l2{border-right:1px solid var(--line);overflow:auto}.two .r2{overflow:auto;padding:30px 34px 40px}
.acthd{font-family:var(--disp);font-size:28px;font-weight:400;letter-spacing:-.02em;margin:0}
.tl{position:relative;padding-left:16px;margin-top:6px}.tl::before{content:'';position:absolute;left:3px;top:6px;bottom:6px;width:1px;background:var(--line)}
.tlrow{position:relative;padding:12px 0;border-bottom:1px solid var(--hair)}.tlrow:last-child{border-bottom:0}
.tlrow::before{content:'';position:absolute;left:-16px;top:17px;width:7px;height:7px;border-radius:50%;background:var(--ink)}
.tlrow.k-email::before{background:var(--warn)}.tlrow.k-call::before{background:var(--ok)}.tlrow.k-meeting::before{background:var(--sig)}
.tlrow .tt{font-size:12.5px;font-weight:600}.tlrow .tb{font-size:11.5px;color:var(--mut);margin-top:4px;line-height:1.5}.tlrow .tm{font-size:10px;color:var(--faint);margin-top:5px}
.kan{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
.kcol .lab{display:block;padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:12px}
.card{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:11px;background:var(--panel);box-shadow:var(--sh);transition:.14s}.card:hover{box-shadow:var(--shh);transform:translateY(-1px)}
.card .tt{font-size:12.5px;font-weight:600;line-height:1.35}.card .mt{font-size:10.5px;color:var(--mut);margin-top:9px;display:flex;justify-content:space-between;gap:8px}
.card[draggable]{cursor:grab}.card.dragging{opacity:.5}.kcol.kover{background:#f1f0ec;outline:2px dashed var(--faint);outline-offset:-3px;border-radius:10px}
/* files best-in-class */
.fmgr{flex:1;display:grid;grid-template-columns:230px 1fr;overflow:hidden}
.fside{border-right:1px solid var(--line);overflow:auto;padding:20px 18px}
.fside input{width:100%;background:#f4f3f1;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font:inherit;font-size:12px;outline:none;margin-bottom:16px}
.fside .fitem{display:flex;justify-content:space-between;font-size:12px;padding:7px 8px;border-radius:7px;cursor:pointer;color:var(--mut)}
.fside .fitem:hover{background:#f2f1ed}.fside .fitem.on{background:var(--ink);color:#fff}
.fside .fitem .c{font-family:var(--num);font-size:10px;opacity:.7}
.storage{margin-top:18px}.storage .tk{height:4px;background:var(--hair);border-radius:3px;overflow:hidden;margin-top:8px}.storage .fl{height:100%;background:var(--ink)}
.fmain{overflow:auto;padding:22px 26px}
.fbulk{display:flex;align-items:center;gap:12px;padding:9px 12px;background:#f2f1ed;border-radius:9px;margin-bottom:12px;font-size:12px}
.fdrawer{position:fixed;top:0;right:0;bottom:0;width:340px;background:var(--panel);border-left:1px solid var(--line);box-shadow:-14px 0 40px rgba(0,0,0,.08);z-index:40;padding:26px 24px;overflow:auto}
.fdrawer .x{position:absolute;top:18px;right:20px;cursor:pointer;color:var(--mut);font-size:16px}
.ck{width:16px;height:16px;accent-color:var(--ink);cursor:pointer}
/* inbox */
.ibx{flex:1;display:grid;grid-template-columns:340px 1fr;overflow:hidden}
.ithreads{border-right:1px solid var(--line);overflow:auto}
.ibar{position:sticky;top:0;background:var(--bg);padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;z-index:2;font-size:11px;color:var(--mut)}
.ithread{padding:14px 18px;border-bottom:1px solid var(--hair);cursor:pointer;display:flex;gap:10px}
.ithread:hover{background:#f5f4f1}.ithread.on{background:#f2f1ed}
.ithread .body{flex:1;min-width:0}
.ithread .su{font-size:12.5px;font-weight:600;display:flex;justify-content:space-between;gap:8px}
.ithread .pv{font-size:11px;color:var(--mut);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ithread .un{width:7px;height:7px;border-radius:50%;background:var(--sig);flex:none;margin-top:5px}
.iconv{overflow:auto;padding:26px 30px;display:flex;flex-direction:column}
.msg{max-width:74%;padding:12px 14px;border-radius:12px;margin-bottom:12px;font-size:12.5px;line-height:1.5}
.msg.in{background:#f2f1ed;align-self:flex-start;border-bottom-left-radius:3px}
.msg.out{background:var(--ink);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.msg .mh{font-size:10px;opacity:.7;margin-bottom:5px}
.compose{border-top:1px solid var(--line);padding:14px 0 0;margin-top:8px;display:flex;gap:10px}
.compose textarea{flex:1;border:1px solid var(--line);border-radius:9px;padding:10px;font:inherit;font-size:12.5px;resize:none;height:64px;outline:none}
/* reports */
.rbuild{display:flex;gap:10px;align-items:center;margin:16px 0 8px;flex-wrap:wrap}
.sel{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font:inherit;font-size:12px;background:#fff;cursor:pointer}
.chart{display:flex;align-items:flex-end;gap:10px;height:200px;border-bottom:1px solid var(--line);padding:0 4px;margin-top:10px}
.chart .cb{flex:1;background:var(--ink);border-radius:4px 4px 0 0;min-height:2px;position:relative}
.chart .cb span{position:absolute;top:-18px;left:0;right:0;text-align:center;font-family:var(--num);font-size:10px;color:var(--mut)}
.chart .cx{font-size:9.5px;color:var(--mut);text-align:center;margin-top:8px;line-height:1.2}
.cxrow{display:flex;gap:10px;padding:0 4px}.cxrow>div{flex:1;text-align:center}
/* billing */
.ucard{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--hair);margin-top:4px}
.ucard>div{background:var(--bg);padding:16px 16px 16px 0}
.ucard .n{font-family:var(--num);font-size:22px;font-weight:500;margin-top:8px}
.ucard .tk{height:4px;background:var(--hair);border-radius:3px;margin-top:10px;overflow:hidden}.ucard .fl{height:100%;background:var(--ink)}
.calbar{display:flex;gap:6px}
.calv{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:7px;padding:6px 12px;cursor:pointer}.calv.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--hair);border:1px solid var(--hair);margin-top:14px}
.mgrid .dow{background:var(--bg);padding:8px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;text-align:center}
.mcell{background:var(--bg);min-height:96px;padding:7px 8px}
.mcell .dn{font-family:var(--num);font-size:11px;color:var(--mut)}.mcell.today .dn{color:var(--ink);font-weight:600}
.mcell.out{background:#f7f6f4}.mcell.out .dn{color:var(--faint)}
.mev{font-size:10px;margin-top:5px;padding:3px 5px;border-radius:4px;background:#f2f1ed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;gap:5px;align-items:center}
.mev[data-ref]{cursor:pointer}.mev[data-ref]:hover{background:#e9e8e3}.mev.more{background:transparent;color:var(--mut);cursor:pointer}.wev[data-ref]{cursor:pointer}.wev[data-ref]:hover{background:#e9e8e3}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-top:14px}
.wcol .lab{display:block;text-align:center;padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:8px}
.wev{font-size:10.5px;padding:7px 8px;border-radius:7px;background:#f2f1ed;margin-bottom:7px}
.calday{margin-bottom:20px}.calday .lab{display:block;padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:2px}
.calrow{display:flex;gap:16px;align-items:baseline;padding:12px 0;border-bottom:1px solid var(--hair);font-size:12.5px}.calrow:last-child{border-bottom:0}
.calrow .tm{font-family:var(--num);font-size:11px;color:var(--mut);width:64px;flex:none}
.load{padding:70px;text-align:center;color:var(--faint);font-size:12px}
.err{max-width:560px;margin:60px auto;padding:24px;border:1px solid var(--line);border-radius:12px;background:#fff}
.copyrow{display:flex;gap:8px;align-items:center;margin-top:12px}
.copyrow code{font-family:var(--num);font-size:11.5px;background:#f2f1ed;padding:7px 11px;border-radius:8px;flex:1;overflow:auto;white-space:nowrap}
/* mobile bottom nav */
.mnav{display:none;position:fixed;left:0;right:0;bottom:0;height:58px;background:var(--panel);border-top:1px solid var(--line);z-index:50}
.mnav .mi{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9.5px;color:var(--faint);cursor:pointer;position:relative}
.mnav .mi.on{color:var(--ink);font-weight:600}
.mnav .mi .ic{font-size:17px;line-height:1}
.mnav .mi .b{position:absolute;top:7px;right:calc(50% - 20px);background:var(--sig);color:#fff;border-radius:8px;font-size:8px;font-weight:600;padding:0 4px}
.msheet{display:none;position:fixed;left:0;right:0;bottom:58px;background:var(--panel);border-top:1px solid var(--line);z-index:49;box-shadow:0 -10px 30px rgba(0,0,0,.07)}
.msheet.on{display:block}
.msheet .mrow{padding:15px 20px;border-bottom:1px solid var(--hair);font-size:14px;cursor:pointer;display:flex;justify-content:space-between}
.msheet .mrow:last-child{border-bottom:0}
.mback{display:none;align-items:center;gap:5px;font-size:12.5px;color:var(--mut);cursor:pointer;margin-bottom:16px;font-weight:500}
/* tablet */
@media(max-width:1080px) and (min-width:761px){.work{grid-template-columns:260px 1fr}.rail{display:none}.two{grid-template-columns:260px 1fr}.ibx{grid-template-columns:300px 1fr}.fmgr{grid-template-columns:196px 1fr}.kan{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:repeat(3,1fr)}.kpi:nth-child(n+4){display:none}}
/* phone */
@media(max-width:760px){
  .mast{gap:9px;padding:0 14px;height:52px}.org{display:none}.live{display:none}.qbox input{width:118px}

function readOf(d){if(d.disposition==="provider_win"||d.state==="award_payment")return["Award — pay","d-ink"];if(d.disposition==="eligibility_challenged")return["Challenged","d-ink"];if((d.score||0)>=80)return["Ineligible","d-red"];if((d.score||0)>=60)return["Review","d-amber"];if(d.state==="qpa_defense")return["Defend QPA","d-ink"];if(d.disposition&&d.disposition!=="open")return[titl(d.disposition),"d-green"];return["Defensible","d-green"];}

function dDetail(){var s=D.disputes,el=document.getElementById("detail"),d=null;if(sel){for(var i=0;i<s.disputes.length;i++)if(s.disputes[i].ref===sel)d=s.disputes[i];}

  var scr=d.score||0,gc=scr>=80?"var(--sig)":scr>=60?"var(--warn)":"var(--ok)";

  var mx=Math.max(d.demand,d.qpa)||1;function bar(l,v,c){return "<div class='bar'><div class='bl'><span>"+l+"</span><span class='num'>"+money(v)+"</span></div><div class='track'><div class='fill' style='width:"+Math.round(v/mx*100)+"%;background:"+c+"'></div></div></div>";}
  var mult=d.qpa?(d.demand/d.qpa):0,gap=d.demand-d.qpa;
  var acts="<button class='btn' id='btn-engine'>Run engine</button>"+(scr>=80?"<button class='btn pri' id='btn-letter'>Generate &amp; sign letter</button>":d.state==="qpa_defense"?"<button class='btn pri' id='btn-letter'>Draft QPA response</button>":"");
  var wp=d.win_prob!=null?Math.round(d.win_prob*100):null;
  var model=wp==null?"":("<div class='sect'><span class='lab'>Model · win probability</span><div style='display:flex;gap:40px;margin-top:18px;align-items:center'><div><div class='num' style='font-size:40px'>"+wp+"%</div><div class='lab' style='margin-top:4px'>plan prevails</div></div><div style='flex:1'><div class='bl'><span>Recommended</span><span style='font-weight:600;text-transform:capitalize'>"+(d.recommended||"—")+"</span></div><div class='track' style='margin:8px 0 16px'><div class='fill' style='width:"+wp+"%;background:var(--ink)'></div></div><div class='bl'><span>Optimal offer</span><span class='num'>"+money(d.recommended_offer)+"</span></div><div class='bl' style='margin-top:8px'><span>Expected savings</span><span class='num'>"+money(d.expected_value)+"</span></div>"+((d.autopilot&&d.autopilot.action)?"<div class='bl' style='margin-top:8px'><span>Autopilot routes to</span><span style='font-weight:600'>"+titl(d.autopilot.action)+" · "+titl(d.autopilot.mode)+"</span></div>":"")+"</div></div></div>");

  var be=document.getElementById("btn-engine");if(be)be.onclick=function(){act("demo_run_engine",sel);};

function idrRender(ref,data,qpa){

function monthGrid(ev){var now=new Date();var y=now.getFullYear(),mo=now.getMonth();var first=new Date(y,mo,1);var start=new Date(first);start.setDate(1-((first.getDay()+6)%7));
  var byday={};ev.forEach(function(e){var k=new Date(e.at);k.setHours(0,0,0,0);byday[k.getTime()]=byday[k.getTime()]||[];byday[k.getTime()].push(e);});

    h+="<div class='mcell"+(out?" out":"")+(istoday?" today":"")+"'><div class='dn'>"+d.getDate()+"</div>";

function weekGrid(ev){var now=new Date();var mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));mon.setHours(0,0,0,0);

  for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);var day=new Date(d);day.setHours(0,0,0,0);

  if(!vths.length)h+="<div class='empty' style='padding:16px 18px'>No "+(inboxFilter==="unread"?"unread ":"")+"threads.</div>";
  document.getElementById("ithreads").innerHTML=h;
  document.querySelectorAll("[data-if]").forEach(function(n){n.onclick=function(){inboxFilter=this.getAttribute("data-if");paintInbox();};});
  document.querySelectorAll("[data-it]").forEach(function(n){n.onclick=function(){inboxSel=this.getAttribute("data-it");if(isMobile)mOpen=true;setMdet();paintInbox();};});
  document.querySelectorAll("[data-ib]").forEach(function(n){n.onchange=function(){inboxChecks[this.getAttribute("data-ib")]=this.checked;paintInbox();};});
  var all=document.getElementById("ib-all");if(all)all.onchange=function(){var v=this.checked;ths.forEach(function(t){inboxChecks[t.id]=v;});paintInbox();};
  var mr=document.getElementById("ib-read");if(mr)mr.onclick=function(){bulkInbox(checked,"read");};
  var mc=document.getElementById("ib-close");if(mc)mc.onclick=function(){bulkInbox(checked,"close");};
  var t=null;ths.forEach(function(x){if(x.id===inboxSel)t=x;});var el=document.getElementById("iconv");
  if(!t){el.innerHTML="<div class='empty'>Select a thread.</div>";return;}
  var msgs=(t.messages||[]).map(function(m){return "<div class='msg "+m.dir+"'><div class='mh'>"+esc(m.sender||"")+" · "+tstr(m.at)+"</div>"+esc(m.body)+"</div>";}).join("");
  el.innerHTML=backBtn()+"<div style='font-family:var(--disp);font-size:19px;margin-bottom:4px'>"+esc(t.subject)+"</div><div class='dmeta' style='margin-bottom:20px'>"+esc(t.account||"")+(t.dispute?" · <span class='num xref' style='color:var(--mut)'>#"+esc(t.dispute)+"</span>":"")+" · "+esc(t.assignee||"")+"</div><div style='flex:1;display:flex;flex-direction:column'>"+msgs+"</div><div class='compose'><textarea id='ib-body' placeholder='Reply…'></textarea><button class='btn pri' id='ib-send'>Send</button></div>";
  document.getElementById("ib-send").onclick=function(){var b=document.getElementById("ib-body").value.trim();if(!b)return;call("demo_inbox_send",{p_thread:inboxSel,p_body:b}).then(function(){D.inbox=null;renderView();});};}
function bulkInbox(ids,action){call("demo_inbox_bulk",{p_ids:ids,p_action:action}).then(function(){inboxChecks={};D.inbox=null;renderView();});}

/* REPORTS */
function paintReports(){var meta=D.reports;
  var mOpts=meta.metrics.map(function(m){return "<option value='"+m.k+"'"+(m.k===repMetric?" selected":"")+">"+m.label+"</option>";}).join("");
  var dOpts=meta.dims.map(function(d){return "<option value='"+d.k+"'"+(d.k===repDim?" selected":"")+">"+d.label+"</option>";}).join("");
  var saved=meta.saved.map(function(s){return "<span class='chip' data-sm='"+s.metric+"' data-sd='"+s.dim+"'>"+esc(s.name)+"</span>";}).join("");
  var chart="",table="";
  if(repData){var rows=repData.rows||[];var max=Math.max.apply(null,rows.map(function(r){return Number(r.value);}).concat([1]));
    var fmt=(repMetric==="count"||repMetric==="avg_score")?function(v){return v;}:money;
    chart="<div class='chart'>"+rows.map(function(r){return "<div class='cb' style='height:"+Math.max(2,Math.round(r.value/max*180))+"px'><span>"+fmt(r.value)+"</span></div>";}).join("")+"</div><div class='cxrow'>"+rows.map(function(r){return "<div class='cx'>"+esc(r.label)+"</div>";}).join("")+"</div>";
    table="<table class='tbl' style='margin-top:26px'><thead><tr><th>"+esc(dimLabel())+"</th><th class='r'>"+esc(metLabel())+"</th></tr></thead><tbody>"+rows.map(function(r){return "<tr><td class='nm'>"+esc(r.label)+"</td><td class='r num'>"+fmt(r.value)+"</td></tr>";}).join("")+"<tr><td class='nm'>Total</td><td class='r num'>"+fmt(repData.total)+"</td></tr></tbody></table>";}
  document.getElementById("view").innerHTML="<div class='page'><div class='pagehd'><h1>Reports</h1><span class='s'>Build a report, then export</span></div><div class='rbuild'><select class='sel' id='r-met'>"+mOpts+"</select><span class='dmeta'>by</span><select class='sel' id='r-dim'>"+dOpts+"</select><button class='btn pri' id='r-run'>Run</button>"+(repData?"<button class='btn' id='r-csv'>Export CSV</button>":"")+"</div><div class='chips' style='margin:6px 0 4px'><span class='lab' style='margin-right:8px'>Saved</span>"+saved+"</div>"+(repData?chart+table:"<div class='empty' style='margin-top:20px'>Pick a metric and dimension, then Run.</div>")+"</div>";
  document.getElementById("r-met").onchange=function(){repMetric=this.value;};
  document.getElementById("r-dim").onchange=function(){repDim=this.value;};
  document.getElementById("r-run").onclick=runReport;
  document.querySelectorAll("[data-sm]").forEach(function(n){n.onclick=function(){repMetric=this.getAttribute("data-sm");repDim=this.getAttribute("data-sd");runReport();};});
  var rc=document.getElementById("r-csv");if(rc)rc.onclick=function(){var rows=repData.rows||[];var csv=dimLabel()+","+metLabel()+"\n"+rows.map(function(r){return '"'+r.label+'",'+r.value;}).join("\n");dl(csv,"report.csv");};}
function dimLabel(){var x="";(D.reports.dims||[]).forEach(function(d){if(d.k===repDim)x=d.label;});return x;}
function metLabel(){var x="";(D.reports.metrics||[]).forEach(function(m){if(m.k===repMetric)x=m.label;});return x;}
function runReport(){call("demo_report_custom",{p_metric:repMetric,p_dim:repDim}).then(function(r){repData=r;paintReports();});}

/* BILLING */
function paintBilling(){var b=D.billing,u=b.usage||{};
  function ub(l,o){var pct=o.included?Math.min(100,Math.round(o.used/o.included*100)):0;return "<div><div class='lab'>"+l+"</div><div class='n'>"+o.used+"<span style='font-size:12px;color:var(--mut)'> / "+o.included+"</span></div><div class='tk'><div class='fl' style='width:"+pct+"%'></div></div></div>";}
  var inv=(b.invoices||[]).map(function(i){return "<tr><td class='nm'>"+esc(i.period)+"</td><td>"+money(i.amount)+"</td><td><span class='tag'><i class='dot "+(i.status==='paid'?'d-green':'d-amber')+"'></i>"+titl(i.status)+"</span></td><td>"+dstr(i.at)+"</td></tr>";}).join("");
  var renews=b.renews_at?new Date(b.renews_at).toLocaleDateString([], {month:'long',day:'numeric',year:'numeric'}):"—";
  document.getElementById("view").innerHTML="<div class='page'><div class='pagehd'><h1>Billing</h1><span class='s'>Plan &amp; metered usage</span></div><div class='sect' style='margin-top:16px'><div style='display:flex;align-items:baseline;gap:14px'><h2 style='font-family:var(--disp);font-weight:400;font-size:24px;margin:0'>"+esc(b.plan)+"</h2><span class='num' style='font-size:18px'>"+money(b.base_price)+"</span><span class='dmeta'>/ month · renews "+renews+"</span></div></div><div class='sect'><span class='lab'>Usage this period</span><div class='ucard'>"+ub("Disputes",u.disputes||{})+ub("Documents",u.docs||{})+ub("Alerts",u.alerts||{})+ub("Seats",u.seats||{})+"</div></div><div class='sect'><span class='lab'>This month</span><div class='meta' style='grid-template-columns:1fr 1fr 1fr;margin-top:8px'><div><div class='lab'>Base</div><div class='n'>"+money(b.base_price)+"</div></div><div><div class='lab'>Overage</div><div class='n'>"+money(b.overage)+"</div></div><div><div class='lab'>Estimated total</div><div class='n'>"+money(b.est_month)+"</div></div></div></div><div class='sect'><span class='lab'>Invoices</span><table class='tbl'><thead><tr><th>Period</th><th>Amount</th><th>Status</th><th>Issued</th></tr></thead><tbody>"+inv+"</tbody></table></div></div>";}

/* SETTINGS */
function paintSettings(){var a=D.admin;
  var users=(a.users||[]).map(function(u){return "<tr><td class='nm'>"+esc(u.name||"—")+"</td><td>"+esc(u.email||"—")+"</td><td>"+titl(u.role)+"</td><td>"+(u.active?"<span class='tag'><i class='dot d-green'></i>Active</span>":"Disabled")+"</td></tr>";}).join("")||"<tr><td colspan='4' class='dmeta'>No users.</td></tr>";
  var dial=(a.autonomy||[]).map(function(x){var dot=x.mode==="auto"?"d-ink":x.mode==="off"?"d-red":"d-amber";return "<tr><td class='nm'>"+titl(x.action)+"</td><td><span class='tag'><i class='dot "+dot+"'></i>"+titl(x.mode)+"</span></td><td class='r num'>"+(x.cap?money(x.cap):"—")+"</td></tr>";}).join("");

  document.getElementById("view").innerHTML="<div class='page'><div class='pagehd'><h1>Settings</h1><span class='s'>Users, autonomy, portal, SSO &amp; trust</span></div><div class='sect' style='margin-top:16px'><span class='lab'>Client portal</span><div class='dmeta' style='margin-top:10px'>Share a read-only portal so a plan sponsor can see their own disputes.</div><div class='copyrow'><code id='ptl'>loading…</code><button class='btn' id='ptl-copy'>Copy</button><button class='btn' id='ptl-open'>Open</button></div></div><div class='sect'><span class='lab'>Users &amp; roles</span><table class='tbl'><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead><tbody>"+users+"</tbody></table></div><div class='sect'><span class='lab'>Autonomy dial</span><table class='tbl'><thead><tr><th>Action</th><th>Mode</th><th class='r'>Money cap</th></tr></thead><tbody>"+dial+"</tbody></table></div><div class='sect'><span class='lab'>Single sign-on</span><div class='meta' style='grid-template-columns:1fr 1fr'><div><div class='lab'>Identity provider</div><div class='n' style='font-size:14px;font-family:var(--sans);font-weight:600'>"+esc(sso.idp||"—")+" · "+String(sso.protocol||"").toUpperCase()+"</div></div><div><div class='lab'>Domain</div><div class='n' style='font-size:14px;font-family:var(--sans);font-weight:600'>"+esc(sso.domain||"—")+(sso.enforced?" · enforced":"")+"</div></div></div></div><div class='sect'><span class='lab'>Trust &amp; compliance</span><div id='trustgrid' style='margin-top:12px'><span class='dmeta'>Loading posture…</span></div></div></div>";
  call("demo_portal_link").then(function(p){var c=document.getElementById("ptl");if(c)c.textContent=p.url;var cp=document.getElementById("ptl-copy");if(cp)cp.onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(p.url);cp.textContent="Copied";};var op=document.getElementById("ptl-open");if(op)op.onclick=function(){window.open(p.url,"_blank");};});
  call("trust_posture").then(function(tp){var g=document.getElementById("trustgrid");if(!g)return;var L=tp.ledger||{};
    var ok=function(st){return /verif|enforc|immut|avail|enabl|256|year|tls/i.test(st);};
    g.innerHTML="<div style='display:grid;grid-template-columns:1fr 1fr;gap:10px'>"+(tp.controls||[]).map(function(c){return "<div style='border:1px solid var(--line);border-radius:10px;padding:12px 14px'><div style='display:flex;justify-content:space-between;align-items:baseline;gap:8px'><span style='font-family:var(--sans);font-weight:600;color:var(--ink);font-size:13px'>"+esc(c.name)+"</span><span style='font-size:11px;font-weight:700;white-space:nowrap;color:"+(ok(c.status)?'var(--ok)':'var(--warn)')+"'>"+esc(c.status)+"</span></div><div style='margin-top:5px;font-size:11.5px;color:var(--mut);line-height:1.45'>"+esc(c.detail)+"</div></div>";}).join("")+"</div><div class='dmeta' style='margin-top:12px'>Hash-chain integrity: <b style='color:"+(L.ok?'var(--ok)':'var(--sig)')+"'>"+(L.ok?'verified ✓':'mismatch')+"</b> · "+(L.rows||0)+" ledger entries · SOC 2 Type II, HIPAA BAA &amp; risk analysis available on request.</div>";}).catch(function(){});}

/* SEARCH */
var qtimer=null;
document.getElementById("q").oninput=function(){var v=this.value.trim(),box=document.getElementById("qres");clearTimeout(qtimer);if(v.length<2){box.innerHTML="";return;}
  qtimer=setTimeout(function(){call("demo_search",{p_q:v}).then(function(res){if(!res||!res.length){box.innerHTML="<div class='qi'><span class='s'>No matches.</span></div>";return;}
    box.innerHTML=res.slice(0,20).map(function(r){return "<div class='qi' data-type='"+r.type+"' data-ref='"+esc(r.ref)+"'><span class='qt'>"+r.type+"</span><b>"+esc(r.label)+"</b><div class='s'>"+esc(r.sub||"")+"</div></div>";}).join("");
    box.querySelectorAll(".qi[data-ref]").forEach(function(n){n.onclick=function(){var ty=this.getAttribute("data-type"),rf=this.getAttribute("data-ref");box.innerHTML="";document.getElementById("q").value="";
      if(ty==="dispute"){sel=rf;switchView("disputes");}else if(ty==="account"||ty==="contact"){acctSel=(ty==="account"?rf:null);crmFilter="all";switchView("clients");}else if(ty==="file"){switchView("files");}else if(ty==="task"){switchView("tasks");}};});});},200);};
document.addEventListener("click",function(e){if(!e.target.closest(".qbox"))document.getElementById("qres").innerHTML="";});
document.getElementById("btn-reload").onclick=function(){D={};sel=null;renderView();};
// ---- auth (real Supabase email OTP + org provisioning) ----
function authApi(path,body){return fetch(SUPA+"/auth/v1/"+path,{method:"POST",headers:{apikey:KEY,"Content-Type":"application/json"},body:JSON.stringify(body)});}
function setAuthUI(){var b=document.getElementById("btn-auth");if(SESSION&&ME&&ME.org){b.textContent="Sign out";document.getElementById("org").textContent=ME.org;}else{b.textContent="Sign in";if(!SESSION)document.getElementById("org").textContent="Demo workspace";}}
function openAuth(){if(SESSION){signOut();return;}authStep=1;document.getElementById("authsheet").style.display="flex";renderAuth();}
function closeAuth(){document.getElementById("authsheet").style.display="none";}
function renderAuth(){var h="<div class='authcard'>";
  if(authStep===1){h+="<div class='lab'>Sign in to Avertyn</div><h2 class='authh'>Your workspace</h2><div class='dmeta'>We'll email you a 6-digit code — no password.</div><input id='auth-email' class='authin' type='email' placeholder='you@company.com' autocomplete='email'><button class='btn pri' id='auth-send' style='width:100%;margin-top:16px'>Send code</button>";}
  else if(authStep===2){h+="<div class='lab'>Check "+esc(authEmail)+"</div><h2 class='authh'>Enter code</h2><input id='auth-code' class='authin' inputmode='numeric' placeholder='6-digit code'><button class='btn pri' id='auth-verify' style='width:100%;margin-top:16px'>Verify &amp; continue</button><div class='dmeta' id='auth-back' style='margin-top:12px;cursor:pointer'>‹ Use a different email</div>";}
  else if(authStep===3){h+="<div class='lab'>Welcome</div><h2 class='authh'>Name your workspace</h2><div class='dmeta'>We'll set you up as admin with a starter set to explore.</div><input id='auth-org' class='authin' placeholder='e.g. Meridian Plan Administrators'><button class='btn pri' id='auth-provision' style='width:100%;margin-top:16px'>Create workspace</button>";}
  h+="<div class='dmeta' id='auth-close' style='margin-top:18px;text-align:center;cursor:pointer'>Continue with the demo</div></div>";
  var sh=document.getElementById("authsheet");sh.innerHTML=h;
  var q=function(id){return document.getElementById(id);};
  if(q("auth-send"))q("auth-send").onclick=sendCode;
  if(q("auth-verify"))q("auth-verify").onclick=verifyCode;
  if(q("auth-provision"))q("auth-provision").onclick=doProvision;
  if(q("auth-back"))q("auth-back").onclick=function(){authStep=1;renderAuth();};
  if(q("auth-close"))q("auth-close").onclick=closeAuth;
  var f=q("auth-email")||q("auth-code")||q("auth-org");if(f)f.focus();}
function sendCode(){var e=(document.getElementById("auth-email").value||"").trim();if(!e)return;authEmail=e;var b=document.getElementById("auth-send");b.textContent="Sending…";b.disabled=true;
  authApi("otp",{email:e,create_user:true}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t.slice(0,160));});authStep=2;renderAuth();}).catch(function(err){alert("Couldn't send code: "+err.message);b.textContent="Send code";b.disabled=false;});}
function verifyCode(){var c=(document.getElementById("auth-code").value||"").trim();if(!c)return;var b=document.getElementById("auth-verify");b.textContent="Verifying…";b.disabled=true;
  authApi("verify",{email:authEmail,token:c,type:"email"}).then(function(r){return r.json();}).then(function(j){if(!j.access_token)throw new Error(j.error_description||j.msg||"Invalid or expired code");SESSION=j.access_token;try{localStorage.setItem('av_session',SESSION);}catch(e){}return call("me");}).then(function(m){ME=m;if(m&&m.needs_org){authStep=3;renderAuth();}else{closeAuth();afterAuth();}}).catch(function(err){alert("Verify failed: "+err.message);b.textContent="Verify & continue";b.disabled=false;});}
function doProvision(){var n=(document.getElementById("auth-org").value||"").trim();var b=document.getElementById("auth-provision");b.textContent="Creating…";b.disabled=true;
  call("provision_org",{p_name:n}).then(function(){return call("me");}).then(function(m){ME=m;closeAuth();afterAuth();}).catch(function(err){alert(err.message);b.textContent="Create workspace";b.disabled=false;});}
function afterAuth(){D={};sel=null;view="disputes";setAuthUI();renderNav();renderView();renderMobileNav();}
function signOut(){SESSION=null;ME=null;try{localStorage.removeItem('av_session');}catch(e){}D={};sel=null;view="disputes";setAuthUI();renderNav();renderView();renderMobileNav();}
document.getElementById("btn-auth").onclick=openAuth;
if(SESSION){call("me").then(function(m){ME=m;if(!m||!m.authed){SESSION=null;try{localStorage.removeItem('av_session');}catch(e){}}setAuthUI();renderNav();renderView();}).catch(function(){SESSION=null;setAuthUI();renderNav();renderView();});}
else{setAuthUI();renderNav();renderView();}

/* best-in-class: cross-link dispute refs everywhere */
(function(){
  function isRef(t){t=(t||'').trim();return /^#IN-[A-Za-z0-9]+$/.test(t);}
  function openRef(ref){try{window.sel=ref;}catch(e){}if(typeof switchView==='function')switchView('disputes');}
  document.addEventListener('click',function(ev){var el=ev.target,h=0;while(el&&h<4){try{if(el.nodeType===1&&el.children.length===0&&isRef(el.textContent)){openRef(el.textContent.trim().slice(1));ev.preventDefault();ev.stopPropagation();return;}}catch(e){}el=el.parentElement;h++;}},true);
  function tagRefs(){try{var ns=document.querySelectorAll('.num,td,b,span');for(var i=0;i<ns.length;i++){var el=ns[i];if(el.children.length===0&&isRef(el.textContent)&&!el.classList.contains('xref'))el.classList.add('xref');}}catch(e){}}
  try{new MutationObserver(function(){tagRefs();}).observe(document.documentElement,{childList:true,subtree:true});}catch(e){}
  var st=document.createElement('style');st.textContent='.xref{cursor:pointer;border-bottom:1px solid var(--line)}.xref:hover{border-bottom-color:var(--ink);color:var(--ink)}';(document.head||document.documentElement).appendChild(st);
  tagRefs();
})();
</script>
